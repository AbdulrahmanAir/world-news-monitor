<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World News Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>WORLD NEWS MONITOR</h1>
    </div>
    <div id="source-chips"></div>
    <div class="status">
      <span id="updated">—</span>
      <button id="refresh-btn" title="Refresh now">⟳</button>
      <span id="clock">--:--:-- UTC</span>
    </div>
  </header>

  <main>
    <div id="map"></div>
    <aside id="panel">
      <div id="filter-bar" class="hidden">
        <span id="filter-name"></span>
        <button id="filter-clear" title="Clear filter (Esc)">✕</button>
      </div>
      <div id="headlines">
        <p class="empty">Loading headlines…</p>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
